[tarpaulin]
# Test coverage configuration for cargo-tarpaulin

# Run all tests including integration tests
run-types = ["Tests"]

# Output formats
out = ["Html", "Lcov"]

# Output directory for coverage reports
output-dir = "coverage"

# Exclude test files from coverage
exclude-files = ["tests/*"]

# Timeout per test in seconds
timeout = "120"

# Use all available threads
jobs = 0

# Skip functions with no coverage data
ignore-tests = true

# Follow symbolic links
follow-exec = true

# Engine (default is ptrace, but llvm is faster on supported platforms)
# engine = "llvm"
